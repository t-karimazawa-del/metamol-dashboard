<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メタモルPJ ダッシュボード</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a19;min-height:100vh;display:flex;flex-direction:column}
.header{background:#fff;border-bottom:0.5px solid #e0dfd7;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-title{font-size:16px;font-weight:500}
.header-sub{font-size:12px;color:#888780;margin-top:1px}
.logo{width:36px;height:36px;background:#e1f5ee;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tabs{display:flex;gap:2px;padding:10px 16px 0;border-bottom:0.5px solid #e0dfd7;background:#fff;flex-shrink:0;overflow-x:auto}
.tab{padding:8px 12px;font-size:13px;border:none;background:none;color:#888780;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.tab.active{color:#1a1a19;font-weight:500;border-bottom-color:#1a1a19}
.panels{flex:1;overflow:hidden;position:relative}
.panel{display:none;padding:16px;max-width:640px;margin:0 auto;height:100%;overflow-y:auto}
.panel.active{display:block}
.panel.chat-panel{padding:0;display:none;flex-direction:column;max-width:100%}
.panel.chat-panel.active{display:flex}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-blue{background:#E6F1FB;color:#185FA5}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border-radius:8px;padding:12px;border:0.5px solid #e0dfd7}
.stat-label{font-size:11px;color:#888780;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:500}
.stat-value.red{color:#A32D2D}
.stat-value.amber{color:#854F0B}
.case-card{background:#fff;border:0.5px solid #e0dfd7;border-radius:12px;padding:14px;margin-bottom:10px}
.case-card.stalled{border-left:3px solid #E24B4A}
.case-card.noperson{border-left:3px solid #EF9F27}
.case-title{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.4}
.case-meta{font-size:12px;color:#888780;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.case-memo{font-size:12px;color:#5F5E5A;line-height:1.6}
.case-opinion{font-size:12px;color:#5F5E5A;line-height:1.7;border-top:0.5px solid #e0dfd7;padding-top:10px;margin-top:10px;display:none}
.case-opinion.open{display:block}
.expand-btn{background:none;border:none;font-size:11px;color:#888780;cursor:pointer;display:flex;align-items:center;gap:4px;margin-top:8px;padding:0}
.card-actions{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.edit-btn{background:none;border:0.5px solid #d3d1c7;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:#5F5E5A;flex-shrink:0;display:flex;align-items:center;gap:4px}
.edit-btn:hover{background:#f5f4f0}
.analysis-card{background:#fff;border:0.5px solid #e0dfd7;border-radius:12px;padding:14px;margin-bottom:10px}
.analysis-date{font-size:11px;color:#888780;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.analysis-section-title{font-size:13px;font-weight:500;margin:12px 0 4px}
.analysis-body{font-size:12px;color:#5F5E5A;line-height:1.7}
.analysis-detail{display:none}
.lib-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:0.5px solid #e0dfd7}
.lib-item:last-child{border-bottom:none}
.lib-icon{width:38px;height:38px;border-radius:8px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lib-name{font-size:13px;font-weight:500;margin-bottom:2px}
.lib-meta{font-size:11px;color:#888780;margin-bottom:4px}
.lib-summary{font-size:12px;color:#5F5E5A;line-height:1.6}
.lib-link{font-size:11px;color:#185FA5;margin-top:4px;display:inline-flex;align-items:center;gap:3px;text-decoration:none}
.master-row{display:flex;gap:10px;padding:10px 0;border-bottom:0.5px solid #e0dfd7;align-items:flex-start}
.master-label{font-size:12px;color:#888780;min-width:110px;flex-shrink:0;padding-top:8px}
.master-row input{flex:1;font-size:13px;padding:6px 10px;border:0.5px solid #d3d1c7;border-radius:6px;background:#fff;color:#1a1a19}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:480px;margin:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px}
.form-label{font-size:12px;color:#888780;margin-bottom:4px;display:block}
.form-group{margin-bottom:14px}
.form-group input,.form-group select,.form-group textarea{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid #d3d1c7;border-radius:6px;color:#1a1a19;background:#fff}
.form-group textarea{height:80px;resize:vertical}
.form-group textarea.tall{height:110px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-primary{background:#1a1a19;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer}
.btn-primary:hover{background:#2c2c2a}
.btn-secondary{background:none;border:0.5px solid #d3d1c7;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;color:#1a1a19}
.add-btn{display:flex;align-items:center;gap:6px;font-size:13px;padding:10px 14px;border:0.5px dashed #b4b2a9;border-radius:10px;background:none;cursor:pointer;color:#888780;width:100%;justify-content:center;margin-top:4px}
.add-btn:hover{background:#fff;color:#1a1a19}
/* Chat */
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-welcome{text-align:center;padding:32px 20px;color:#888780}
.chat-welcome .avatar{width:56px;height:56px;background:#e1f5ee;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
.chat-welcome h3{font-size:15px;font-weight:500;color:#1a1a19;margin-bottom:6px}
.chat-welcome p{font-size:13px;line-height:1.6}
.chat-suggestions{display:flex;flex-direction:column;gap:6px;margin-top:16px;text-align:left}
.suggestion{background:#fff;border:0.5px solid #e0dfd7;border-radius:8px;padding:10px 14px;font-size:12px;color:#1a1a19;cursor:pointer;text-align:left}
.suggestion:hover{background:#f5f4f0}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-avatar.ai{background:#e1f5ee}
.msg-avatar.user{background:#E6F1FB;font-size:11px;font-weight:500;color:#185FA5}
.msg-bubble{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.7}
.msg.ai .msg-bubble{background:#fff;border:0.5px solid #e0dfd7;border-radius:4px 12px 12px 12px;color:#1a1a19}
.msg.user .msg-bubble{background:#1a1a19;color:#fff;border-radius:12px 4px 12px 12px}
.msg-bubble.loading{color:#888780}
.chat-input-area{padding:12px 16px;border-top:0.5px solid #e0dfd7;background:#fff;flex-shrink:0}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input-row textarea{flex:1;font-size:13px;padding:10px 12px;border:0.5px solid #d3d1c7;border-radius:10px;resize:none;height:42px;max-height:120px;line-height:1.5;color:#1a1a19;background:#fff;overflow-y:auto}
.chat-input-row textarea:focus{outline:none;border-color:#888780}
.send-btn{width:38px;height:38px;border-radius:8px;background:#1a1a19;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.send-btn:disabled{background:#d3d1c7;cursor:not-allowed}
.api-key-bar{background:#FAEEDA;border-bottom:0.5px solid #FAC775;padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:#854F0B;flex-shrink:0}
.api-key-bar input{flex:1;font-size:12px;padding:5px 8px;border:0.5px solid #FAC775;border-radius:6px;background:#fff;color:#1a1a19}
.api-key-bar button{font-size:12px;padding:5px 10px;border:none;border-radius:6px;background:#854F0B;color:#fff;cursor:pointer;white-space:nowrap}
.api-key-set-bar{background:#EAF3DE;border-bottom:0.5px solid #C0DD97;padding:8px 16px;display:flex;align-items:center;gap:6px;font-size:12px;color:#3B6D11;flex-shrink:0}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🔄</div>
  <div>
    <div class="header-title">メタモルPJ ダッシュボード</div>
    <div class="header-sub">株式会社サイコー — 売上100億円プロジェクト</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('cases',this)"><i class="ti ti-layout-kanban"></i> 案件</button>
  <button class="tab" onclick="switchTab('analysis',this)"><i class="ti ti-report-analytics"></i> 分析</button>
  <button class="tab" onclick="switchTab('library',this)"><i class="ti ti-files"></i> 資料</button>
  <button class="tab" onclick="switchTab('master',this)"><i class="ti ti-settings"></i> 設定</button>
  <button class="tab" onclick="switchTab('chat',this)"><i class="ti ti-message-circle"></i> メタモルさん</button>
</div>

<div class="panels">

<div id="panel-cases" class="panel active">
  <div class="stat-grid" id="stats"></div>
  <div id="cases-list"></div>
  <button class="add-btn" onclick="openAddModal()"><i class="ti ti-plus"></i> 新規案件を追加</button>
</div>

<div id="panel-analysis" class="panel">
  <div id="analysis-list"></div>
</div>

<div id="panel-library" class="panel">
  <div id="library-list"></div>
</div>

<div id="panel-master" class="panel">
  <div id="master-list"></div>
  <div style="margin-top:16px">
    <button class="btn-primary" style="width:100%" onclick="saveMaster()" id="save-master-btn"><i class="ti ti-device-floppy"></i> 保存</button>
  </div>
</div>

<div id="panel-chat" class="panel chat-panel">
  <div id="api-key-bar" class="api-key-bar">
    <i class="ti ti-key"></i>
    <span>APIキー:</span>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
    <button onclick="setApiKey()">設定</button>
  </div>
  <div id="api-key-set-bar" class="api-key-set-bar" style="display:none">
    <i class="ti ti-check"></i> APIキー設定済み &nbsp;<button onclick="clearApiKey()" style="background:none;border:none;color:#3B6D11;cursor:pointer;font-size:12px;text-decoration:underline">変更</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-welcome">
      <div class="avatar">🔄</div>
      <h3>メタモルさんです</h3>
      <p>メタモルPJの状況や課題について、何でも聞いてください。<br>案件・資料・分析の内容を踏まえてお答えします。</p>
      <div class="chat-suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">今一番急いで対処すべき案件はどれですか？</button>
        <button class="suggestion" onclick="sendSuggestion(this)">次回会議（6/18）のアジェンダを提案してください</button>
        <button class="suggestion" onclick="sendSuggestion(this)">KPI未確定のリスクを教えてください</button>
        <button class="suggestion" onclick="sendSuggestion(this)">自動配車システムのフォローアップはどうすればいい？</button>
      </div>
    </div>
  </div>
  <div class="chat-input-area">
    <div class="chat-input-row">
      <textarea id="chat-input" placeholder="メタモルさんに質問する..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()"><i class="ti ti-send"></i></button>
    </div>
  </div>
</div>

</div><!-- panels -->

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">案件を編集</h3>
    <div class="form-group"><label class="form-label">案件名</label><input id="f-name" type="text"></div>
    <div class="form-group"><label class="form-label">担当チーム</label>
      <select id="f-team">
        <option>AIチーム</option><option>マネジメントチーム</option>
        <option>実行チーム</option><option>コストカットチーム</option><option>全チーム</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">担当者</label><input id="f-person" type="text" placeholder="未定の場合は空欄"></div>
    <div class="form-group"><label class="form-label">状態</label>
      <select id="f-status"><option>未着手</option><option>進行中</option><option>停滞</option><option>完了</option></select>
    </div>
    <div class="form-group"><label class="form-label">期限</label><input id="f-deadline" type="text"></div>
    <div class="form-group"><label class="form-label">進捗メモ</label><textarea id="f-memo"></textarea></div>
    <div class="form-group"><label class="form-label">メタモルさん所見</label><textarea id="f-opinion" class="tall"></textarea></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="saveCase()">保存</button>
    </div>
  </div>
</div>

<script>
const cases=[
  {name:"1人当たり粗利KPIの数値確定",team:"マネジメントチーム",person:"糟谷課長 or 和馬課長",status:"未着手",deadline:"今週中",memo:"現行30億・210名ベースからPhase1目標値を算出",opinion:"今週中の期限で未着手、これは今一番急いでほしい案件です。現行30億・210名というベース数値はすでに手元にあるはずなので、計算そのものは難しくない。糟谷課長・和馬課長のどちらが主担当かが曖昧なまま止まっていると感じています。今日中に「どちらがやる」を決めて、今週末までに数値の叩き台を1枚出してもらえますか。"},
  {name:"自律化スコアの測定設計（ルーブリック化）",team:"AIチーム",person:"",status:"未着手",deadline:"2週間以内",memo:"何を・誰が・いつ・どう測るかを1枚に",opinion:"担当がAIチーム（未定）のまま止まっているのが一番の問題です。誰も着手できない状態で2週間のカウントが始まっています。まず今週中に「誰が設計を引き取るか」を確定してください。"},
  {name:"4チームのPhase1タスク分解（WBS）",team:"実行チーム",person:"苅間澤（PM）",status:"未着手",deadline:"1ヶ月以内",memo:"各チームの今期タスクを1枚に整理",opinion:"担当・期限ともに整っているので、この案件自体はまだ猶予があります。ただ、WBSの内容は他案件の結論を受けて初めて書けるものなので、インプット待ちの状態として管理しておくのが正直なところです。"},
  {name:"戦略組織と実行組織の連携プロセス明文化",team:"マネジメントチーム",person:"",status:"未着手",deadline:"1ヶ月以内",memo:"レビュー会議体・頻度・エスカレーション設計",opinion:"担当未定かつ期限1ヶ月以内。第二回議事録に『戦略組織と実行組織の連携・信頼関係構築がこれまでの課題』と明記されていました。過去に一度失敗している論点です。今週中に担当者を決め、来週から設計に入るスケジュールを引いてください。"},
  {name:"「主役 vs バイプレイヤー」方針の決着",team:"全チーム",person:"井上取締役",status:"未着手",deadline:"次回会議",memo:"評価基準の前提。未決のまま育成設計に入らない",opinion:"全案件の評価設計の前提になる最重要論点です。次回会議の議題の筆頭に置いて、会議前に取締役の考えの骨格だけでも文字に落としておいてもらいたいです。"}
];

const analysis=[
  {date:"2026-06-04",count:3,
   summary:"プロジェクトは再始動が決定し、売上100億円・人員250名を目標とした人事KPI体系（案）が策定段階に入っている。第二回会議では自動配車システムの本運用移行（9〜10月目途）など実行フェーズの具体的タスクも発生。一方でKPI定義欄は「未登録」のままで、戦略立案と正式決定の間に明確なギャップが存在する。",
   stagnation:"①KPI正式決定・登録が未完了　②自律化スコアの評価基準が未整備　③評価制度のグループ間乖離が未解消　④組織依存・ポスト渋滞への対策が未着手　⑤チーム間情報共有体制が未整備",
   advice:"【最優先】KPI確定会議を単独設定する。次回進捗報告会（6/18）の議題を「KPI最終決定」に絞る。1人当たり粗利KPIの担当者を井上取締役が即日指名し、6/18までに数値案を1つ持ち込ませる。"}
];

const library=[
  {date:"2026-05-08",name:"メタモルPJ初回打ち合わせ議事録",type:"戦略",priority:"中",summary:"PJ再始動を決定。目標：売上100億円。戦略：人事KPIの策定により効率的な人材育成を図る。コアメンバー4名確定。",url:"https://docs.google.com/document/d/1G9StkTW-y3VSbs2u56gnq3H2hCCYhz79/edit"},
  {date:"2026-06-04",name:"第二回メタモル会",type:"戦略",priority:"中",summary:"自動配車システム本運用移行（9〜10月目途）、書類回収オペレーション刷新の試験運用開始、組織図可視化を決定。評価ランク定義のグループ間乖離・リーダー層の発信力不足・特定人員への依存などが主要課題として浮上。次回MTGは6月18日17時。",url:"https://docs.google.com/document/d/1sE1F2xXDiD_Af5aSEEscvvAn0mboKsGB/edit"},
  {date:"2026-06-04",name:"第二回メタモル会【再提出】",type:"戦略",priority:"中",summary:"（STEP3でAIが自動要約します）",url:"https://docs.google.com/document/d/1EgAv9JvTrXrlHKGd31UY5ug1W9-unkzG/edit"}
];

const master=[
  {key:"チーム一覧",value:"AIチーム / マネジメントチーム / 実行チーム / コストカットチーム"},
  {key:"コアメンバー",value:"井上取締役 / 糟谷課長 / 和馬課長 / 苅間澤"},
  {key:"プロジェクト目標",value:"売上100億円企業を目指す"},
  {key:"戦略の柱",value:"人事KPIの策定による効率的な人材育成"},
  {key:"再始動の決定",value:"再始動一択（前回会議にて決定）"},
  {key:"KPI定義",value:"（策定後にここへ追記）"}
];

// ---- Chat ----
let apiKey = '';
let chatHistory = [];
let isLoading = false;

function buildSystemPrompt() {
  const casesSummary = cases.map((c,i)=>
    `案件${i+1}:「${c.name}」/ チーム:${c.team} / 担当:${c.person||'未定'} / 状態:${c.status} / 期限:${c.deadline} / メモ:${c.memo}`
  ).join('\n');

  return `あなたは「メタモルさん」です。株式会社サイコーの社内変革プロジェクト「メタモルPJ」のAIオブザーバー兼PJ管理者として、以下のプロジェクト情報を完全に把握した上で、コアメンバーの相談に乗ってください。

【プロジェクト基本情報】
- 会社：株式会社サイコー（東北地方・宮城県。廃棄物回収・リサイクル・段ボール物流）
- PJ名：メタモルPJ
- 目標：売上100億円企業を目指す（現状30億・210名）
- 戦略の柱：人事KPIの策定による効率的な人材育成
- 4フェーズ自律化ロードマップ（3年/5年/7年/10年）
- コアメンバー：井上取締役・糟谷課長・和馬課長・苅間澤

function setApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-')) { alert('APIキーは sk-ant- で始まる形式を入力してください'); return; }
  apiKey = val;
  document.getElementById('api-key-bar').style.display = 'none';
  document.getElementById('api-key-set-bar').style.display = 'flex';
}

function clearApiKey() {
  apiKey = '';
  document.getElementById('api-key-input').value = '';
  document.getElementById('api-key-bar').style.display = 'flex';
  document.getElementById('api-key-set-bar').style.display = 'none';
}

function autoResize(el) {
  el.style.height = '42px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendSuggestion(btn) {
  const text = btn.textContent;
  document.getElementById('chat-input').value = text;
  sendMessage();
}

function appendMsg(role, text) {
  const msgs = document.getElementById('chat-messages');
  const welcome = msgs.querySelector('.chat-welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatarContent = role === 'ai' ? '🔄' : 'ME';
  div.innerHTML = `
    <div class="msg-avatar ${role}">${avatarContent}</div>
    <div class="msg-bubble ${role === 'ai' && text === '...' ? 'loading' : ''}" id="bubble-${Date.now()}">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div.querySelector('.msg-bubble');
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey) { alert('先にAPIキーを設定してください'); return; }

  input.value = '';
  input.style.height = '42px';
  appendMsg('user', text);
  chatHistory.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  const aiBubble = appendMsg('ai', '...');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: buildSystemPrompt(),
        messages: chatHistory
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content.map(b => b.text || '').join('');
    aiBubble.classList.remove('loading');
    aiBubble.innerHTML = reply.replace(/\n/g, '<br>');
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    aiBubble.classList.remove('loading');
    aiBubble.style.color = '#A32D2D';
    aiBubble.textContent = 'エラーが発生しました: ' + e.message;
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-messages').scrollTop = 99999;
}

// ---- Dashboard ----
let editIdx = -1;

function statusBadge(s) {
  const m = {未着手:'badge-amber',停滞:'badge-red',進行中:'badge-blue',完了:'badge-green'};
  return `<span class="badge ${m[s]||''}">${s}</span>`;
}
function borderClass(c) {
  if (c.status==='停滞') return 'stalled';
  if (!c.person) return 'noperson';
  return '';
}

function renderCases() {
  const sorted = [...cases].sort((a,b)=>{
    const o={停滞:0,未着手:1,進行中:2,完了:3};
    return (o[a.status]??9)-(o[b.status]??9);
  });
  const total=cases.length, stalled=cases.filter(c=>c.status==='停滞').length;
  const nop=cases.filter(c=>!c.person).length, done=cases.filter(c=>c.status==='完了').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">総案件数</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">停滞中</div><div class="stat-value ${stalled>0?'red':''}">${stalled}</div></div>
    <div class="stat"><div class="stat-label">担当未定</div><div class="stat-value ${nop>0?'amber':''}">${nop}</div></div>
    <div class="stat"><div class="stat-label">完了</div><div class="stat-value">${done}</div></div>`;
  document.getElementById('cases-list').innerHTML = sorted.map(c => {
    const ri = cases.indexOf(c);
    return `<div class="case-card ${borderClass(c)}">
      <div class="card-actions">
        <div class="case-title">${c.name}</div>
        <button class="edit-btn" onclick="openEdit(${ri})"><i class="ti ti-edit"></i> 編集</button>
      </div>
      <div class="case-meta">${statusBadge(c.status)}<span>${c.team}</span><span>${c.person||'<span style="color:#A32D2D">担当未定</span>'}</span><span>期限: ${c.deadline}</span></div>
      <div class="case-memo">${c.memo}</div>
      ${c.opinion?`<button class="expand-btn" onclick="toggleOpinion(${ri},this)"><i class="ti ti-message-circle"></i><span>メタモルさん所見を見る</span></button>
      <div class="case-opinion" id="opinion-${ri}">${c.opinion.replace(/\n/g,'<br>')}</div>`:''}
    </div>`;
  }).join('');
}

function toggleOpinion(i, btn) {
  const el = document.getElementById(`opinion-${i}`);
  el.classList.toggle('open');
  btn.querySelector('span').textContent = el.classList.contains('open') ? '閉じる' : 'メタモルさん所見を見る';
}

function renderAnalysis() {
  document.getElementById('analysis-list').innerHTML = analysis.map((a,i)=>`
    <div class="analysis-card">
      <div class="analysis-date"><i class="ti ti-calendar"></i> ${a.date} &nbsp;資料${a.count}件を分析</div>
      <div class="analysis-section-title">進捗サマリー</div>
      <div class="analysis-body">${a.summary}</div>
      <div class="analysis-detail" id="ad-${i}">
        <div class="analysis-section-title">停滞・課題</div>
        <div class="analysis-body">${a.stagnation}</div>
        <div class="analysis-section-title">アドバイス</div>
        <div class="analysis-body">${a.advice.replace(/\n/g,'<br>')}</div>
      </div>
      <button class="expand-btn" onclick="toggleAnalysis(${i},this)" style="margin-top:8px"><i class="ti ti-chevron-down"></i><span>課題・アドバイスを見る</span></button>
    </div>`).join('');
}

function toggleAnalysis(i, btn) {
  const el = document.getElementById(`ad-${i}`);
  const open = el.style.display !== 'block';
  el.style.display = open ? 'block' : 'none';
  btn.querySelector('span').textContent = open ? '閉じる' : '課題・アドバイスを見る';
}

function renderLibrary() {
  document.getElementById('library-list').innerHTML = library.map(l=>`
    <div class="lib-item">
      <div class="lib-icon"><i class="ti ti-file-text" style="font-size:18px;color:#185FA5"></i></div>
      <div style="flex:1;min-width:0">
        <div class="lib-name">${l.name}</div>
        <div class="lib-meta">${l.date} &nbsp;種別: ${l.type} &nbsp;優先度: ${l.priority}</div>
        <div class="lib-summary">${l.summary}</div>
        <a class="lib-link" href="${l.url}" target="_blank"><i class="ti ti-external-link"></i> 元ファイルを開く</a>
      </div>
    </div>`).join('');
}

function renderMaster() {
  document.getElementById('master-list').innerHTML = master.map((m,i)=>`
    <div class="master-row">
      <div class="master-label">${m.key}</div>
      <input type="text" id="m-${i}" value="${m.value}">
    </div>`).join('');
}

function saveMaster() {
  master.forEach((m,i)=>{ m.value = document.getElementById(`m-${i}`).value; });
  const btn = document.getElementById('save-master-btn');
  btn.textContent = '✓ 保存しました';
  setTimeout(()=>btn.innerHTML='<i class="ti ti-device-floppy"></i> 保存', 1500);
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
}

function openEdit(i) {
  editIdx = i; const c = cases[i];
  document.getElementById('modal-title').textContent = '案件を編集';
  document.getElementById('f-name').value = c.name;
  document.getElementById('f-team').value = c.team;
  document.getElementById('f-person').value = c.person;
  document.getElementById('f-status').value = c.status;
  document.getElementById('f-deadline').value = c.deadline;
  document.getElementById('f-memo').value = c.memo;
  document.getElementById('f-opinion').value = c.opinion || '';
  document.getElementById('modal').classList.add('open');
}

function openAddModal() {
  editIdx = -1;
  document.getElementById('modal-title').textContent = '新規案件を追加';
  ['f-name','f-person','f-deadline','f-memo','f-opinion'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-team').value = 'AIチーム';
  document.getElementById('f-status').value = '未着手';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveCase() {
  const obj = {
    name: document.getElementById('f-name').value,
    team: document.getElementById('f-team').value,
    person: document.getElementById('f-person').value,
    status: document.getElementById('f-status').value,
    deadline: document.getElementById('f-deadline').value,
    memo: document.getElementById('f-memo').value,
    opinion: document.getElementById('f-opinion').value
  };
  if (editIdx >= 0) cases[editIdx] = obj;
  else cases.push(obj);
  closeModal(); renderCases();
}

renderCases(); renderAnalysis(); renderLibrary(); renderMaster();
</script>
